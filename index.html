<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Components Showcase</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        overflow-x: hidden;
    }

    header {
        text-align: center;
        padding: 40px 20px;
        font-size: 2.5rem;
        font-weight: bold;
        background: linear-gradient(90deg, #6366f1, #22c55e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 25px;
        padding: 30px;
    }

    .card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        padding: 20px;
        text-align: center;
        transition: 0.4s;
        cursor: pointer;
        position: relative;
        overflow: hidden;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.05);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .card img {
        width: 100px;
        height: 100px;
        object-fit: contain;
        transition: transform 0.5s ease;
    }

    .card:hover img {
        transform: rotate(10deg) scale(1.1);
    }

    .card h3 {
        margin-top: 15px;
        font-size: 1.2rem;
    }

    /* Glow effect */
    .card::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(99,102,241,0.2), transparent);
        top: -50%;
        left: -50%;
        opacity: 0;
        transition: 0.5s;
    }

    .card:hover::before {
        opacity: 1;
    }

    /* Floating animation */
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .card img {
        animation: float 4s ease-in-out infinite;
    }

    footer {
        text-align: center;
        padding: 20px;
        opacity: 0.6;
    }

    /* Responsive tweaks */
    @media (max-width: 600px) {
        header {
            font-size: 1.8rem;
        }
    }
</style>
</head>
