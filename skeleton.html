<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intel i5-14400</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

/* Heading */
h1 {
    padding: 20px;
    font-size: clamp(22px, 4vw, 40px);
}

/* Slider */
.slider {
    position: relative;
    width: 90%;
    max-width: 900px;
    margin: 20px auto;
    overflow: hidden;
    border-radius: 16px;
}

.slides {
    display: flex;
    transition: transform 0.8s ease-in-out;
}

.slide {
    min-width: 100%;
}

.slide img {
    width: 100%;
    display: block;
    cursor: pointer;
}

/* Arrows */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 50%;
}

.left { left: 10px; }
.right { right: 10px; }

/* Table Section */
.specs {
    width: 90%;
    max-width: 900px;
    margin: 30px auto;
    text-align: left;
}

.specs h2 {
    margin-bottom: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    overflow: hidden;
}

td {
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

td:first-child {
    font-weight: bold;
    width: 40%;
    color: #ccc;
}

/* Viewer */
.viewer {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.viewer img {
    max-width:90%;
    max-height:90%;
}

.viewer.active { display:flex; }

</style>
</head>

<body>

<h1>Intel Core i5-14400</h1>

<!-- SLIDER -->
<div class="slider" id="slider">
    <div class="slides" id="slides">
        <div class="slide">
            <img src="products/Intel-Core-i5-14400-10-Core-LGA-1700-Processor-BX8071514400.png">
        </div>
    </div>

    <button class="arrow left" onclick="prevSlide()">❮</button>
    <button class="arrow right" onclick="nextSlide()">❯</button>
</div>

<!-- SPEC TABLE -->
<div class="specs">
    

</div>
	
</div>

<!-- FULLSCREEN -->
<div class="viewer" id="viewer" onclick="closeViewer()">
    <img id="viewerImg">
</div>

<script>
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

function updateSlide() {
    slides.style.transform = `translateX(-${index * 100}%)`;
}

function nextSlide() {
    index = (index + 1) % totalSlides;
    updateSlide();
}

function prevSlide() {
    index = (index - 1 + totalSlides) % totalSlides;
    updateSlide();
}

setInterval(nextSlide, 5000);

/* Swipe */
let startX = 0;

slider.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
    if (startX - endX > 50) nextSlide();
    if (endX - startX > 50) prevSlide();
});

/* Viewer */
const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");

document.querySelectorAll(".slide img").forEach(img => {
    img.onclick = () => {
        viewer.classList.add("active");
        viewerImg.src = img.src;
    }
});

function closeViewer() {
    viewer.classList.remove("active");
}
</script>

</body>
</html>
